<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sajam 2026 — Dobavljači</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }

.nav { background: #1a237e; color: #fff; display: flex; align-items: stretch; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.nav-logo { padding: 14px 14px; font-weight: 800; font-size: 0.88rem; letter-spacing: 1px; border-right: 1px solid rgba(255,255,255,0.15); white-space: nowrap; display: flex; align-items: center; }
.nav-tabs { display: flex; flex: 1; }
.nav-tab { flex: 1; padding: 6px 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.62rem; font-weight: 700; color: rgba(255,255,255,0.55); cursor: pointer; border-bottom: 3px solid transparent; gap: 3px; text-align: center; transition: all .2s; }
.nav-tab svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.nav-tab.active { color: #fff; border-bottom-color: #82b1ff; }

.sync-bar { padding: 6px 14px; font-size: 0.75rem; text-align: center; display: none; font-weight: 600; }
.sync-bar.syncing { background: #e3f2fd; color: #1565c0; display: block; }
.sync-bar.ok { background: #e8f5e9; color: #2e7d32; display: block; }
.sync-bar.err { background: #ffebee; color: #c62828; display: block; }
.sync-bar.offline { background: #fff3e0; color: #e65100; display: block; }

.korisnik-bar { background: #e8eaf6; padding: 8px 14px; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
.korisnik-bar label { color: #3949ab; font-weight: 700; margin: 0; }
.korisnik-bar select { border: 1px solid #c5cae9; border-radius: 6px; padding: 5px 10px; font-size: 0.82rem; background: #fff; }
.korisnik-bar .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; margin-left: auto; flex-shrink: 0; }
.korisnik-bar .online-dot.off { background: #bbb; }

.screen { display: none; padding: 14px; max-width: 640px; margin: 0 auto; padding-bottom: 30px; }
.screen.active { display: block; }

.card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
.card-title { font-size: 0.72rem; font-weight: 700; color: #7986cb; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }

.upload-zone { border: 2px dashed #c5cae9; border-radius: 12px; padding: 28px 20px; text-align: center; cursor: pointer; background: #f8f9ff; transition: all .2s; }
.upload-zone:active { background: #e8eaf6; }
.upload-zone .ico { font-size: 2.8rem; margin-bottom: 10px; }
.upload-zone p { color: #555; font-size: 0.9rem; font-weight: 600; }
.upload-zone small { color: #aaa; font-size: 0.78rem; display: block; margin-top: 5px; }
#fileInput { display: none; }
#imgPreview { width: 100%; border-radius: 10px; max-height: 200px; object-fit: contain; display: none; margin-bottom: 10px; background: #f5f5f5; }

.form-group { margin-bottom: 10px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
label { font-size: 0.72rem; font-weight: 700; color: #666; display: block; margin-bottom: 4px; }
input[type=text], input[type=tel], textarea, select {
  width: 100%; border: 1.5px solid #dde; border-radius: 9px; padding: 10px 13px;
  font-size: 0.9rem; outline: none; background: #fafbff; color: #222;
  -webkit-appearance: none; transition: border-color .2s;
}
input:focus, textarea:focus, select:focus { border-color: #3949ab; }
textarea { resize: vertical; min-height: 70px; }

.ai-btn { width: 100%; padding: 13px; border: none; border-radius: 11px; background: #1565c0; color: #fff; font-size: 0.92rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; }
.ai-btn:disabled { background: #90a4ae; }

.ai-status { border-radius: 9px; padding: 10px 14px; font-size: 0.82rem; margin-bottom: 10px; display: none; align-items: center; gap: 8px; }
.ai-status.loading { background: #e3f2fd; color: #1565c0; display: flex; }
.ai-status.success { background: #e8f5e9; color: #2e7d32; display: flex; }
.ai-status.error { background: #ffebee; color: #c62828; display: flex; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }

.items-header { display: grid; grid-template-columns: 1fr 90px 75px 32px; gap: 8px; margin-bottom: 6px; }
.items-header span { font-size: 0.68rem; color: #aaa; font-weight: 700; text-transform: uppercase; }
.item-row { display: grid; grid-template-columns: 1fr 90px 75px 32px; gap: 8px; margin-bottom: 8px; align-items: center; }
.item-row input { padding: 9px 10px; font-size: 0.82rem; }
.remove-btn { background: #ffebee; border: none; color: #e53935; border-radius: 8px; padding: 9px 8px; cursor: pointer; font-size: 1rem; font-weight: 700; }
.add-item-btn { width: 100%; padding: 9px; border: 2px dashed #c5cae9; border-radius: 9px; background: none; color: #7986cb; font-size: 0.82rem; font-weight: 700; cursor: pointer; margin-top: 4px; }

.save-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #1a237e; color: #fff; font-size: 1rem; font-weight: 800; cursor: pointer; }
.save-btn:disabled { background: #90a4ae; }

/* BAZA */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.stat { background: #fff; border-radius: 12px; padding: 12px; text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
.stat-n { font-size: 1.7rem; font-weight: 800; color: #1a237e; }
.stat-l { font-size: 0.68rem; color: #888; margin-top: 2px; }

.search-wrap { position: relative; margin-bottom: 12px; }
.search-wrap input { padding-left: 38px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; }

.dob-card { background: #fff; border-radius: 13px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); cursor: pointer; transition: transform .15s; }
.dob-card:active { transform: scale(0.98); }
.dob-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.dob-name { font-weight: 800; font-size: 0.97rem; color: #1a237e; }
.dob-sub { font-size: 0.75rem; color: #888; margin-top: 3px; }
.badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; }
.b-blue { background: #e3f2fd; color: #1565c0; }
.b-green { background: #e8f5e9; color: #2e7d32; }
.b-orange { background: #fff3e0; color: #e65100; }
.b-purple { background: #f3e5f5; color: #6a1b9a; }
.pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.pill { background: #f0f2f5; color: #555; font-size: 0.7rem; padding: 3px 9px; border-radius: 10px; }

.refresh-btn { width: 100%; padding: 11px; border: 1.5px solid #c5cae9; background: #fff; color: #3949ab; border-radius: 10px; font-weight: 700; font-size: 0.85rem; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; }

/* DRAWER */
.drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; }
.drawer-overlay.open { display: block; }
.drawer { position: fixed; bottom: 0; left: 0; right: 0; max-width: 640px; margin: 0 auto; background: #fff; border-radius: 20px 20px 0 0; max-height: 88vh; overflow-y: auto; padding: 16px; z-index: 501; transform: translateY(100%); transition: transform .3s ease; }
.drawer.open { transform: translateY(0); }
.drawer-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 14px; }
.drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.drawer-title { font-size: 1.05rem; font-weight: 800; color: #1a237e; }
.close-btn { background: #f5f5f5; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 1.1rem; cursor: pointer; }
.detail-tbl { width: 100%; font-size: 0.85rem; border-collapse: collapse; }
.detail-tbl td { padding: 8px 0; border-bottom: 0.5px solid #eee; }
.detail-tbl td:first-child { color: #888; width: 90px; }
.items-tbl { width: 100%; font-size: 0.82rem; border-collapse: collapse; margin-top: 10px; }
.items-tbl th { background: #f5f7ff; padding: 7px 9px; text-align: left; font-size: 0.7rem; font-weight: 800; color: #3949ab; text-transform: uppercase; }
.items-tbl td { padding: 8px 9px; border-bottom: 0.5px solid #eee; }
.items-tbl .price { font-weight: 800; color: #1565c0; }

/* USPOREDI */
.cmp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.cmp-card { background: #fff; border-radius: 13px; padding: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); text-align: center; border: 2px solid transparent; }
.cmp-card.best { border-color: #2e7d32; background: #f9fff9; }
.cmp-card.worst { border-color: #ffcdd2; }
.best-tag { background: #2e7d32; color: #fff; font-size: 0.65rem; font-weight: 800; padding: 2px 10px; border-radius: 10px; display: inline-block; margin-bottom: 5px; }
.cmp-dob { font-weight: 700; font-size: 0.82rem; color: #3949ab; }
.cmp-price { font-size: 1.4rem; font-weight: 800; color: #1a237e; margin: 4px 0; }
.cmp-moq { font-size: 0.72rem; color: #999; }

.empty { text-align: center; padding: 50px 20px; color: #ccc; }
.empty .ico { font-size: 3rem; display: block; margin-bottom: 12px; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a237e; color: #fff; padding: 11px 24px; border-radius: 24px; font-size: 0.85rem; font-weight: 700; z-index: 1000; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; max-width: 90vw; text-align: center; }
.toast.show { opacity: 1; }
</style>
</head>

    <div class="nav-tab" onclick="goTab('baza')" id="tab-baza">

          <span style="font-size:2rem">📷</span>Kamera
        </button>
        <button onclick="document.getElementById('fileInputGallery').click()" style="border:2px dashed #c5cae9;border-radius:12px;padding:22px 10px;background:#f8f9ff;cursor:pointer;font-size:0.88rem;font-weight:700;color:#3949ab;display:flex;flex-direction:column;align-items:center;gap:8px">

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzOw67CiNrv_AAZ7SObL9eaqqvHLC2KMAzHMhlEqF7xbUPm2Wfv4vp9OUMdzoilz3NN/exec';
const LOCAL_KEY = 'sajam_local_v1';

let suppliers = [];
let items = [];
let pendingImg = null;
let korisnik = 'Osoba 1';
let editingId = null;

// SYNC BAR
function syncBar(msg, type) {
  const el = document.getElementById('syncBar');
  el.textContent = msg;
  el.className = 'sync-bar ' + type;
  if (type === 'ok') setTimeout(() => el.className = 'sync-bar', 3000);
}

// TOAST
function toast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ONLINE CHECK
function checkOnline() {
  const dot = document.getElementById('onlineDot');
  const lbl = document.getElementById('onlineLbl');
  if (navigator.onLine) {
    dot.className = 'online-dot';
    lbl.textContent = 'online';
  } else {
    dot.className = 'online-dot off';
    lbl.textContent = 'offline';
    syncBar('⚠ Offline — podaci se čuvaju lokalno', 'offline');
  }
}
window.addEventListener('online', () => { checkOnline(); fetchFromSheets(); });
window.addEventListener('offline', checkOnline);
checkOnline();

// LOCAL STORAGE
function saveLocal() { localStorage.setItem(LOCAL_KEY, JSON.stringify(suppliers)); }
function loadLocal() {
  try { const d = localStorage.getItem(LOCAL_KEY); if (d) suppliers = JSON.parse(d); } catch(e) {}
}

// SEND TO SHEETS
async function sendToSheets(sup) {
  syncBar('⏳ Šaljem u Google tablicu...', 'syncing');
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sup)
    });
    syncBar('✅ Spremljeno u Google tablicu!', 'ok');
    return true;
  } catch(err) {
    syncBar('⚠ Greška — spremljeno lokalno', 'err');
    return false;
  }
}

// FETCH FROM SHEETS
async function fetchFromSheets() {
  if (!navigator.onLine) { toast('Nema interneta'); return; }
  syncBar('⏳ Učitavam podatke iz tablice...', 'syncing');
  try {
    const res = await fetch(SHEETS_URL + '?t=' + Date.now());
    const data = await res.json();
    if (data.status === 'ok' && data.rows.length > 1) {
      const headers = data.rows[0];
      const idIdx = headers.indexOf('ID');
      const grouped = {};
      data.rows.slice(1).forEach(row => {
        const id = row[idIdx];
        if (!id) return;
        if (!grouped[id]) {
          grouped[id] = {
            id: parseInt(id),
            datum: row[headers.indexOf('Datum')],
            korisnik: row[headers.indexOf('Korisnik')],
            naziv: row[headers.indexOf('Dobavljač')],
            zemlja: row[headers.indexOf('Zemlja')],
            stand: row[headers.indexOf('Stand')],
            sajam: row[headers.indexOf('Sajam')],
            kontakt: row[headers.indexOf('Kontakt')],
            email: row[headers.indexOf('Email')],
            telefon: row[headers.indexOf('Telefon')],
            napomena: row[headers.indexOf('Napomena')],
            artikli: []
          };
        }
        const artikl = row[headers.indexOf('Artikl')];
        if (artikl) {
          grouped[id].artikli.push({
            naziv: artikl,
            cijena: row[headers.indexOf('Cijena')],
            moq: row[headers.indexOf('MOQ')]
          });
        }
      });
      suppliers = Object.values(grouped);
      saveLocal();
      renderBaza();
      renderCompare();
      renderTop5();
      syncBar('✅ Podaci osvježeni — ' + suppliers.length + ' dobavljača', 'ok');
    }
  } catch(err) {
    syncBar('⚠ Greška pri učitavanju', 'err');
  }
}

// TABS
function goTab(t) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  document.getElementById('screen-' + t).classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'baza') renderBaza();
  if (t === 'usporedi') { renderCompare(); renderTop5(); }
}

// IMAGE
let cameraStream = null;

function showImage(dataUrl) {
  pendingImg = dataUrl;
  const preview = document.getElementById('imgPreview');
  preview.src = dataUrl;
  preview.style.display = 'block';
  document.getElementById('btnAI').style.display = 'flex';
  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('cameraView').style.display = 'none';
}

// GALLERY
document.getElementById('fileInputGallery').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => showImage(ev.target.result);
  reader.readAsDataURL(file);
  this.value = '';
});

// CAMERA via getUserMedia
async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('videoEl');
    video.srcObject = cameraStream;
    document.getElementById('cameraView').style.display = 'block';
    document.getElementById('uploadZone').style.display = 'none';
  } catch(err) {
    alert('Kamera nije dostupna: ' + err.message + '\n\nKoristi galeriju.');
  }
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('cameraView').style.display = 'none';
  document.getElementById('uploadZone').style.display = 'block';
}

function capturePhoto() {
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  stopCamera();
  showImage(dataUrl);
}

async function readWithAI() {
  if (!pendingImg) return;
  const st = document.getElementById('aiStatus');
  const btn = document.getElementById('btnAI');
  st.className = 'ai-status loading';
  st.innerHTML = '<div class="spinner"></div> AI čita sliku, pričekaj...';
  btn.disabled = true;
  try {
    const base64 = pendingImg.split(',')[1];
    const mime = pendingImg.split(';')[0].split(':')[1];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: mime, data: base64 } },
          { type: 'text', text: 'Analiziraj ovu sliku. Moze biti katalog, vizitka, cjenik, papir s biljezkama ili kombinacija tiskanog i rukom pisanog teksta.\n\nPAZLJIVO TRAZI:\n1. Podatke o firmi: naziv, kontakt, email, telefon, zemlja\n2. Tiskane artikle, modele, sifre i cijene\n3. RUKOM PISANE biljezke su najvaznije! Nase interne sifre (npr AB1234), cijene, MOQ, komentare, podcrtano\n4. Sve sto je rukom napisano stavi doslovno u napomena\n\nVrati SAMO JSON:\n{\"naziv\":\"naziv firme\",\"kontakt\":\"ime\",\"email\":\"email ili wechat\",\"telefon\":\"tel\",\"zemlja\":\"zemlja\",\"napomena\":\"SVE rukom pisane biljezke doslovno\",\"artikli\":[{\"naziv\":\"artikl\",\"cijena\":\"cijena s valutom\",\"moq\":\"min narudzba\"}]}\n\nAko nesto ne vidis stavi \"\". Artikle kojima je rukom dopisana cijena svakako ukljuci.}
        ]}]
      })
    });
    const data = await res.json();
    const p = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    if (p.naziv) document.getElementById('f_naziv').value = p.naziv;
    if (p.kontakt) document.getElementById('f_kontakt').value = p.kontakt;
    if (p.email) document.getElementById('f_email').value = p.email;
    if (p.telefon) document.getElementById('f_telefon').value = p.telefon;
    if (p.napomena) document.getElementById('f_napomena').value = p.napomena;
    if (p.zemlja) { const s = document.getElementById('f_zemlja'); for (let o of s.options) { if (o.value.toLowerCase().includes(p.zemlja.toLowerCase())) { s.value = o.value; break; } } }
    if (p.artikli?.length) { items = []; renderItems(); p.artikli.forEach(a => addItem(a.naziv, a.cijena, a.moq)); }
    st.className = 'ai-status success';
    st.innerHTML = '✅ AI popunio ' + (p.artikli?.length||0) + ' artikala — provjeri i ispravi!';
  } catch(err) {
    st.className = 'ai-status error';
    st.innerHTML = '❌ ' + err.message + ' — unesi ručno';
  }
  btn.disabled = false;
}

// ITEMS
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function renderItems() {
  document.getElementById('itemsList').innerHTML = items.map((it,i) => `
    <div class="item-row">
      <input type="text" value="${esc(it.naziv)}" placeholder="naziv" oninput="items[${i}].naziv=this.value">
      <input type="text" value="${esc(it.cijena)}" placeholder="npr. 2.5$" oninput="items[${i}].cijena=this.value">
      <input type="text" value="${esc(it.moq)}" placeholder="100kom" oninput="items[${i}].moq=this.value">
      <button class="remove-btn" onclick="removeItem(${i})">✕</button>
    </div>`).join('');
}
function addItem(n='',c='',m='') { items.push({naziv:n,cijena:c,moq:m}); renderItems(); }
function removeItem(i) { items.splice(i,1); renderItems(); }

// SAVE
async function saveSupplier() {
  const naziv = document.getElementById('f_naziv').value.trim();
  if (!naziv) { toast('❗ Upiši naziv dobavljača!'); return; }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Šaljem...';

  const sup = {
    id: editingId || Date.now(),
    korisnik, naziv,
    kontakt: document.getElementById('f_kontakt').value.trim(),
    email: document.getElementById('f_email').value.trim(),
    telefon: document.getElementById('f_telefon').value.trim(),
    stand: document.getElementById('f_stand').value.trim(),
    zemlja: document.getElementById('f_zemlja').value,
    sajam: document.getElementById('f_sajam').value.trim(),
    napomena: document.getElementById('f_napomena').value.trim(),
    artikli: items.filter(i => i.naziv.trim()),
    datum: new Date().toLocaleDateString('hr-HR')
  };

  if (editingId) suppliers = suppliers.map(s => s.id === editingId ? sup : s);
  else suppliers.push(sup);
  saveLocal();
  await sendToSheets(sup);
  resetForm();
  btn.disabled = false;
  btn.textContent = '💾 SPREMI I POŠALJI U TABLICU';
  toast('✅ Dobavljač spremljen!');
  goTab('baza');
}

function resetForm() {
  ['f_naziv','f_kontakt','f_email','f_telefon','f_stand','f_sajam','f_napomena'].forEach(id => document.getElementById(id).value = '');
  editingId = null; items = []; renderItems(); addItem();
  pendingImg = null;
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('btnAI').style.display = 'none';
  document.getElementById('cameraView').style.display = 'none';
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('aiStatus').style.display = 'none';
  document.getElementById('fileInputGallery').value = ''; document.getElementById('cameraView').style.display = 'none'; stopCamera();
}

// STATS & BAZA
function updateStats() {
  document.getElementById('s-dob').textContent = suppliers.length;
  document.getElementById('s-art').textContent = suppliers.reduce((s,d)=>s+(d.artikli?.length||0),0);
  document.getElementById('s-sajm').textContent = new Set(suppliers.map(d=>d.sajam).filter(Boolean)).size;
}

function renderBaza() {
  updateStats();
  const q = document.getElementById('bazaSearch').value.toLowerCase();
  const el = document.getElementById('bazaList');
  const list = suppliers.filter(s => !q || s.naziv.toLowerCase().includes(q) || s.artikli?.some(a=>a.naziv?.toLowerCase().includes(q)));
  if (!list.length) {
    el.innerHTML = `<div class="empty"><span class="ico">🏪</span><p>${suppliers.length ? 'Nema rezultata.' : 'Još nema unosa.<br>Idi na UNOS i dodaj prvog!'}</p></div>`;
    return;
  }
  el.innerHTML = list.slice().reverse().map(s => `
    <div class="dob-card" onclick="openDrawer(${s.id})">
      <div class="dob-top">
        <div>
          <div class="dob-name">${esc(s.naziv)}</div>
          <div class="dob-sub">${[s.kontakt,s.email,s.telefon].filter(Boolean).join(' · ')}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
          ${s.zemlja?`<span class="badge b-blue">${s.zemlja}</span>`:''}
          ${s.stand?`<span class="badge b-orange">${s.stand}</span>`:''}
          ${s.korisnik?`<span class="badge b-purple">${s.korisnik}</span>`:''}
        </div>
      </div>
      ${s.artikli?.length?`<div class="pills">${s.artikli.slice(0,4).map(a=>`<span class="pill">${esc(a.naziv)}${a.cijena?' · '+a.cijena:''}</span>`).join('')}${s.artikli.length>4?`<span class="pill">+${s.artikli.length-4}</span>`:''}</div>`:''}
      <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
        ${s.sajam?`<span style="font-size:.7rem;color:#aaa">📅 ${s.sajam}</span>`:''}
        <span style="font-size:.7rem;color:#aaa">${s.datum||''}</span>
        ${s.artikli?.length?`<span class="badge b-green">${s.artikli.length} artikala</span>`:''}
      </div>
    </div>`).join('');
}

// DRAWER
function openDrawer(id) {
  const s = suppliers.find(x=>x.id===id); if (!s) return;
  document.getElementById('drawerTitle').textContent = s.naziv;
  document.getElementById('drawerBody').innerHTML = `
    <table class="detail-tbl">
      <tr><td>Kontakt</td><td>${esc(s.kontakt)||'—'}</td></tr>
      <tr><td>Email</td><td style="color:#1565c0">${esc(s.email)||'—'}</td></tr>
      <tr><td>Telefon</td><td>${esc(s.telefon)||'—'}</td></tr>
      <tr><td>Stand</td><td>${esc(s.stand)||'—'}</td></tr>
      <tr><td>Zemlja</td><td>${s.zemlja||'—'}</td></tr>
      <tr><td>Sajam</td><td>${esc(s.sajam)||'—'}</td></tr>
      <tr><td>Unio</td><td>${esc(s.korisnik)||'—'}</td></tr>
      ${s.napomena?`<tr><td>Napomena</td><td style="font-style:italic">${esc(s.napomena)}</td></tr>`:''}
    </table>
    ${s.artikli?.length?`
      <div style="margin-top:12px;font-size:.72rem;font-weight:700;color:#7986cb;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Artikli i cijene</div>
      <table class="items-tbl">
        <thead><tr><th>Artikl</th><th>Cijena</th><th>MOQ</th></tr></thead>
        <tbody>${s.artikli.map(a=>`<tr><td>${esc(a.naziv)}</td><td class="price">${a.cijena||'—'}</td><td>${a.moq||'—'}</td></tr>`).join('')}</tbody>
      </table>`:''}
    <div style="display:flex;gap:10px;margin-top:14px">
      <button onclick="deleteSup(${id})" style="flex:1;padding:11px;border:1.5px solid #ffcdd2;background:#fff;color:#c62828;border-radius:9px;font-weight:700;cursor:pointer">🗑 Briši</button>
      <button onclick="editSup(${id})" style="flex:2;padding:11px;border:none;background:#1a237e;color:#fff;border-radius:9px;font-weight:700;cursor:pointer">✏️ Uredi</button>
    </div>`;
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
function deleteSup(id) {
  if (!confirm('Obriši?')) return;
  suppliers = suppliers.filter(s=>s.id!==id);
  saveLocal(); closeDrawer(); renderBaza(); toast('Obrisano lokalno');
}
function editSup(id) {
  const s = suppliers.find(x=>x.id===id); if (!s) return;
  editingId = id;
  document.getElementById('f_naziv').value = s.naziv;
  document.getElementById('f_kontakt').value = s.kontakt||'';
  document.getElementById('f_email').value = s.email||'';
  document.getElementById('f_telefon').value = s.telefon||'';
  document.getElementById('f_stand').value = s.stand||'';
  document.getElementById('f_zemlja').value = s.zemlja||'Kina';
  document.getElementById('f_sajam').value = s.sajam||'';
  document.getElementById('f_napomena').value = s.napomena||'';
  items = (s.artikli||[]).map(a=>({...a}));
  renderItems();
  closeDrawer(); goTab('unos');
}

// COMPARE
function renderCompare() {
  const q = (document.getElementById('cmpSearch')?.value||'').toLowerCase();
  const el = document.getElementById('cmpResult');
  if (!q||q.length<2) { el.innerHTML='<div style="text-align:center;color:#ccc;padding:20px;font-size:.85rem">Upiši naziv artikla</div>'; return; }
  const found = [];
  suppliers.forEach(s => s.artikli?.forEach(a => {
    if (a.naziv?.toLowerCase().includes(q)) {
      const n = parseFloat((a.cijena||'').replace(/[^0-9.,]/g,'').replace(',','.')) || 0;
      found.push({dob:s.naziv,zemlja:s.zemlja,stand:s.stand,artikl:a.naziv,cijena:a.cijena,moq:a.moq,n});
    }
  }));
  if (!found.length) { el.innerHTML=`<div style="text-align:center;color:#ccc;padding:20px;font-size:.85rem">Nema rezultata</div>`; return; }
  found.sort((a,b)=>a.n-b.n);
  el.innerHTML = `<div style="font-size:.75rem;color:#999;margin-bottom:8px">${found.length} ponuda</div>
    <div class="cmp-grid">${found.map((f,i)=>`
      <div class="cmp-card ${i===0&&found.length>1?'best':''} ${i===found.length-1&&found.length>1?'worst':''}">
        ${i===0&&found.length>1?'<div class="best-tag">NAJJEFTINIJE</div>':''}
        <div class="cmp-dob">${esc(f.dob)}</div>
        <div style="font-size:.68rem;color:#aaa">${f.zemlja||''}${f.stand?' · '+f.stand:''}</div>
        <div class="cmp-price">${f.cijena||'—'}</div>
        <div class="cmp-moq">MOQ: ${f.moq||'—'}</div>
      </div>`).join('')}
    </div>`;
}

function renderTop5() {
  const all = [];
  suppliers.forEach(s => s.artikli?.forEach(a => {
    const n = parseFloat((a.cijena||'').replace(/[^0-9.,]/g,'').replace(',','.')) || 0;
    if (n>0) all.push({dob:s.naziv,artikl:a.naziv,cijena:a.cijena,moq:a.moq,n});
  }));
  all.sort((a,b)=>a.n-b.n);
  const el = document.getElementById('top5');
  if (!all.length) { el.innerHTML='<div style="color:#ccc;font-size:.85rem;text-align:center;padding:16px">Nema podataka</div>'; return; }
  el.innerHTML = all.slice(0,5).map(t=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid #eee">
      <div><div style="font-size:.85rem;font-weight:700">${esc(t.artikl)}</div><div style="font-size:.72rem;color:#888">${esc(t.dob)}</div></div>
      <div style="text-align:right"><div style="font-weight:800;color:#1565c0">${t.cijena}</div><div style="font-size:.7rem;color:#aaa">MOQ: ${t.moq||'—'}</div></div>
    </div>`).join('');
}

// INIT
loadLocal();
addItem();
updateStats();
if (navigator.onLine) fetchFromSheets();
</script>
</body>
